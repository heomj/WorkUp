spring.application.name=WebMarket

# 세션 유지를 하지 않도록 설정 (Persistent Manager 비활성화)
server.servlet.session.persistent=false
server.servlet.session.store-dir=none
spring.main.allow-circular-references=true

# debug 로그로 설정
logging.level.kr.or.ddit=debug

server.servlet.context-path=/
# 서버 포트 변경
server.port=80

# view resolver 접두어, 접미사 설정
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

spring.datasource.url=
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=
#MEMBER 테이블의 MEM_ID : memId
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.jdbc-type-for-null=varchar
#DTO(Data Transper Object : 값 변경이 없음) -> VO(Value Object : 값 변경이 있음)
mybatis.type-aliases-package=
#LPROD 테이블을 위한 매퍼XML : lprod-Mapper.xml
#classpath : src/main/resources
mybatis.mapper-locations=classpath:/mybatis/mapper/**/*Mapper.xml

#업로드 될 폴더 경로 설정 
file.uploadFolder=

# 1. API Key 설정 (Google AI Studio에서발급받은키그대로사용)
spring.ai.openai.api-key=
# 2. ★핵심: 접속주소를 Google Gemini의 'OpenAI 호환엔드포인트'로변경
spring.ai.openai.base-url=
# 3. 모델설정 (Gemini 모델명지정)
spring.ai.openai.chat.options.model=
spring.ai.openai.chat.options.temperature=0.7

# 아래도 파일업로드 용량설정임 그냥 참고하자
# default 128K
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=24MB
spring.servlet.multipart.file-size-threshold=24MB

